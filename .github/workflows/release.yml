name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run build:standalone

      - name: Package release assets
        run: |
          cp dist-standalone/index.html syncthing-ignore-visualizer-standalone.html
          (cd dist && zip -r ../syncthing-ignore-visualizer-dist.zip .)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            syncthing-ignore-visualizer-standalone.html
            syncthing-ignore-visualizer-dist.zip
          generate_release_notes: true
